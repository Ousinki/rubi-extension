name: Publish Extension to Web Stores

on:
  push:
    tags:
      - 'v*' # 当你推送带有 v 开头的 tag (如 v1.0.0) 时自动触发

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build and Package Extension
        run: npm run zip # 这会在 .output 目录生成 .zip 包

      - name: Submit to Chrome Web Store
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          npx wxt submit --chrome-zip .output/*-chrome.zip
        # 注意：WXT Submit 也可以同步上传 Edge 和 Firefox，只需补充对应的 env Secret 即可
