<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- 深色学术科技感背景 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <!-- 四层渐变金属材质色 -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f472b6" />
      <stop offset="100%" stop-color="#be185d" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#6b21a8" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#4c1d95" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>

    <!-- 强烈的阴影层 -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="-12" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- 1. 背景圆角矩形 -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)" />

  <!-- 2. R U B I 几何字母组合 (从左到右重叠) -->
  <g transform="translate(60, 340) scale(1.2)">
    <!-- R (第一层) -->
    <g transform="translate(0, 0)" filter="url(#shadow)">
      <path d="M 0 0 h 140 c 44 0 80 36 80 80 v 20 c 0 32 -18 60 -45 72 l 75 128 h -70 l -65 -115 h -55 v 115 h -60 z M 60 60 v 65 h 70 c 14 0 25 -11 25 -25 v -15 c 0 -14 -11 -25 -25 -25 h -70 z" 
            fill-rule="evenodd" fill="url(#grad1)" stroke="#090514" stroke-width="12" stroke-linejoin="round" />
    </g>

    <!-- U (第二层) -->
    <g transform="translate(180, 0)" filter="url(#shadow)">
      <path d="M 0 0 h 60 v 180 c 0 44 36 80 80 80 s 80 -36 80 -80 v -180 h 60 v 180 c 0 77 -63 140 -140 140 s -140 -63 -140 -140 z" 
            fill="url(#grad2)" stroke="#090514" stroke-width="12" stroke-linejoin="round" />
    </g>

    <!-- B (第三层) -->
    <g transform="translate(390, 0)" filter="url(#shadow)">
      <path d="M 0 0 h 130 c 33 0 60 27 60 60 c 0 20 -10 38 -25 48 c 20 10 35 30 35 52 c 0 33 -27 60 -60 60 h -140 z M 60 50 v 40 h 60 c 11 0 20 -9 20 -20 s -9 -20 -20 -20 z M 60 130 v 50 h 70 c 11 0 20 -9 20 -20 s -9 -20 -20 -20 z" 
            fill-rule="evenodd" fill="url(#grad3)" stroke="#090514" stroke-width="12" stroke-linejoin="round" />
    </g>

    <!-- I (第四层) -->
    <g transform="translate(580, 0)" filter="url(#shadow)">
      <path d="M 0 0 h 180 v 50 h -60 v 200 h 60 v 50 h -180 v -50 h 60 v -200 h -60 z" 
            fill="url(#grad4)" stroke="#090514" stroke-width="12" stroke-linejoin="round" />
    </g>
  </g>
</svg>
